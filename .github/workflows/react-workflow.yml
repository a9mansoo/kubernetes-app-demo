name: Frontend CI

on:
    push:
        branches:
            - master
    
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - frontend/*

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20
            
            - name: Install dependencies
              working-directory: frontend/app
              run: |
                npm ci .
            
            - name: Format
              working-directory: frontend/app
              run: | 
                npm run format
    
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20
            
            - name: Install dependencies
              working-directory: frontend/app
              run: |
                npm ci .
            
            - name: Lint
              working-directory: frontend/app
              run: | 
                npm run lint
    
    build:
        runs-on: ubuntu-latest
        needs: [format, lint]
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20
            
            - name: Install dependencies
              working-directory: frontend/app
              run: |
                npm ci .
            
            - name: Build
              working-directory: frontend/app
              run: | 
                npm run build
    
    test:
        runs-on: ubuntu-latest
        needs: [build]
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                node-version: 20
            
            - name: Install dependencies
              working-directory: frontend/app
              run: |
                npm ci .
            
            - name: Test
              working-directory: frontend/app
              run: | 
                npm run test